# A3 ablation: interpolation weight dec_sc_alpha at 8 steps
# Compare full replacement (1.0) vs blending (0.7, 0.5) vs baseline (0.0 equiv = no dec_sc)
- sampling_method: ode
  num_sampling_steps: [4, 8]
  cfgs: [1]
  self_cond_cfg_scales: [3]
  time_schedule: uniform
  use_dec_sc: false

- sampling_method: ode
  num_sampling_steps: [4, 8]
  cfgs: [1]
  self_cond_cfg_scales: [3]
  time_schedule: uniform
  use_dec_sc: true
  dec_sc_alpha: 1.0

- sampling_method: ode
  num_sampling_steps: [4, 8]
  cfgs: [1]
  self_cond_cfg_scales: [3]
  time_schedule: uniform
  use_dec_sc: true
  dec_sc_alpha: 0.7

- sampling_method: ode
  num_sampling_steps: [4, 8]
  cfgs: [1]
  self_cond_cfg_scales: [3]
  time_schedule: uniform
  use_dec_sc: true
  dec_sc_alpha: 0.5
