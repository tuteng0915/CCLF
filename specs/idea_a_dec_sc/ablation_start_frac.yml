# A1 ablation: adaptive dec_sc — start applying at different fractions of the trajectory
# start_frac=0.0 → all steps; 0.5 → last 50%; 0.75 → last 25%
- sampling_method: ode
  num_sampling_steps: [4, 8]
  cfgs: [1]
  self_cond_cfg_scales: [3]
  time_schedule: uniform
  use_dec_sc: false

- sampling_method: ode
  num_sampling_steps: [4, 8]
  cfgs: [1]
  self_cond_cfg_scales: [3]
  time_schedule: uniform
  use_dec_sc: true
  dec_sc_start_frac: 0.0

- sampling_method: ode
  num_sampling_steps: [4, 8]
  cfgs: [1]
  self_cond_cfg_scales: [3]
  time_schedule: uniform
  use_dec_sc: true
  dec_sc_start_frac: 0.5

- sampling_method: ode
  num_sampling_steps: [4, 8]
  cfgs: [1]
  self_cond_cfg_scales: [3]
  time_schedule: uniform
  use_dec_sc: true
  dec_sc_start_frac: 0.75
